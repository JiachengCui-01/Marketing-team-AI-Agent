services:
  - type: web
    name: marketing-agent-api
    runtime: python
    plan: standard
    buildCommand: pip install -e .
    startCommand: uvicorn server.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    disk:
      name: marketing-agent-data
      mountPath: /var/data
      sizeGB: 3
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MARKETING_AGENT_DB_PATH
        value: /var/data/marketing_agent.db
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Cache the rembg u2net weights (~170MB) on the persistent disk so they
      # survive restarts instead of re-downloading to ephemeral storage.
      - key: U2NET_HOME
        value: /var/data/rembg
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ORIGIN_REGEX
        value: https://.*\.vercel\.app
